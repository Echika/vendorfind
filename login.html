<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VendorFind</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav class="navbar">
    <div class="container">
        <div class="nav-brand">
            <a href="index.html">VendorFind</a>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html">Find Vendors</a></li>
            <!-- Dashboard link will appear here dynamically when logged in -->
            <li><a href="sdg-impact.html">Our Impact</a></li>
            <!-- Login/Signup or User menu will appear here dynamically -->
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>

    <main class="auth-page">
        <div class="container">
            <div class="auth-form-container">
                <h1>Welcome Back</h1>
                <p>Login to your VendorFind account</p>
                
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>

                    <div class="form-group form-checkbox">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>

                    <button type="submit" class="btn-primary btn-full">Login</button>
                </form>

                <p class="auth-redirect">
                    Don't have an account? <a href="signup.html">Sign up as vendor</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Vendors - VendorFind</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
   <nav class="navbar">
    <div class="container">
        <div class="nav-brand">
            <a href="index.html">VendorFind</a>
        </div>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html">Find Vendors</a></li>
            <!-- Dashboard link will appear here dynamically when logged in -->
            <li><a href="sdg-impact.html">Our Impact</a></li>
            <!-- Login/Signup or User menu will appear here dynamically -->
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</nav>

    <main class="search-page">
        <div class="container">
            <div class="search-header">
                <h1>Find Local Vendors</h1>
                
                <div class="search-filters">
                    <div class="search-bar">
                        <input type="text" id="keywordSearch" placeholder="Search by keyword...">
                        <button id="searchBtn" class="btn-primary">Search</button>
                    </div>

                    <div class="filters">
                        <div class="filter-group">
                            <label for="categoryFilter">Category</label>
                            <select id="categoryFilter">
                                <option value="">All Categories</option>
                                <option value="Food">Food</option>
                                <option value="Services">Services</option>
                                <option value="Retail">Retail</option>
                                <option value="Artisan">Artisan</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="filter-group">
                            <label for="locationFilter">Location</label>
                            <input type="text" id="locationFilter" placeholder="Enter city or area">
                        </div>

                        <button id="applyFilters" class="btn-outline">Apply Filters</button>
                    </div>
                </div>
            </div>

            <div class="vendor-grid" id="vendorGrid">
                <!-- Vendors will be dynamically loaded here -->
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/vendors.js"></script>
    <script src="../js/search.js"></script>
</body>
</html>
